<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Bibliothèque UNZ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height:100vh;background:linear-gradient(135deg,#1a237e,#283593)">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-lg">
                    <div class="card-header text-center py-3">
                        <h4>📚 Connexion</h4>
                        <p class="mb-0">Bibliothèque Universitaire UNZ</p>
                    </div>
                    <div class="card-body p-4">
                        <div id="alertBox"></div>
                        <form id="loginForm" onsubmit="login(event)" novalidate>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Email universitaire</label>
                                <div class="input-group">
                                    <span class="input-group-text">📧</span>
                                    <input type="email" id="email" class="form-control" 
                                           placeholder="exemple@unz.bf" required>
                                </div>
                                <div class="invalid-feedback">Veuillez entrer un email valide</div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Mot de passe</label>
                                <div class="input-group">
                                    <span class="input-group-text">🔒</span>
                                    <input type="password" id="password" class="form-control" 
                                           placeholder="Votre mot de passe" required minlength="6">
                                    <button class="btn btn-outline-secondary" type="button" 
                                            onclick="togglePassword()">👁️</button>
                                </div>
                                <div class="invalid-feedback">Minimum 6 caractères</div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2 mb-3" id="submitBtn">
                                Se connecter
                            </button>
                        </form>
                        <div class="text-center">
                            <p>Pas encore de compte ? <a href="/register">S'inscrire</a></p>
                            <a href="/" class="text-muted">← Retour à l'accueil</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function login(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const alertBox = document.getElementById('alertBox');
            const submitBtn = document.getElementById('submitBtn');

            if (!email || !password) {
                showAlert('danger', 'Veuillez remplir tous les champs');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading"></span> Connexion...';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, motDePasse: password})
                });
                const data = await response.json();

                if (data.token) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data));
                    showAlert('success', 'Connexion réussie ! Redirection...');
                    setTimeout(() => {
                        window.location.href = data.role === 'ADMINISTRATEUR' ? '/admin' : '/catalogue';
                    }, 1000);
                } else {
                    showAlert('danger', data.message || 'Email ou mot de passe incorrect');
                }
            } catch(e) {
                showAlert('danger', 'Erreur de connexion au serveur');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Se connecter';
            }
        }

        function showAlert(type, message) {
            document.getElementById('alertBox').innerHTML = 
                `<div class="alert alert-${type} alert-dismissible fade show">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>`;
        }

        function togglePassword() {
            const pwd = document.getElementById('password');
            pwd.type = pwd.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>
</html>
