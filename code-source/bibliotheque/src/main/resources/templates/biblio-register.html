<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer Bibliothécaire - UNZ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h4>Créer un compte Bibliothécaire</h4>
                    </div>
                    <div class="card-body">
                        <div id="message"></div>
                        <form onsubmit="createBiblio(event)">
                            <div class="mb-3">
                                <label class="form-label">Nom</label>
                                <input type="text" id="nom" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Prénom</label>
                                <input type="text" id="prenom" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" id="email" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Mot de passe</label>
                                <input type="password" id="password" class="form-control" required minlength="6">
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Créer le compte</button>
                        </form>
                        <p class="mt-3 text-center"><a href="/login">Déjà un compte ?</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function createBiblio(e) {
            e.preventDefault();
            const response = await fetch('/api/auth/biblio-register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    nom: document.getElementById('nom').value,
                    prenom: document.getElementById('prenom').value,
                    email: document.getElementById('email').value,
                    motDePasse: document.getElementById('password').value
                })
            });
            const data = await response.json();
            document.getElementById('message').innerHTML = 
                `<div class="alert alert-${response.ok ? 'success' : 'danger'}">${data.message}</div>`;
            if (response.ok) setTimeout(() => window.location.href = '/login', 1500);
        }
    </script>
</body>
</html>
