<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogue - Bibliothèque UNZ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <script>
        if (!localStorage.getItem('token')) {
            window.location.href = '/login';
        }
    </script>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">📚 Bibliothèque UNZ</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link active" href="/catalogue">Catalogue</a></li>
                    <li class="nav-item" id="navEmprunts"><a class="nav-link" href="/emprunts">Mes Emprunts</a></li>
                    <li class="nav-item" id="navReservations"><a class="nav-link" href="/reservations">Réservations</a></li>
                    <li class="nav-item" id="navAdmin" style="display:none"><a class="nav-link" href="/admin">⚙️ Administration</a></li>
                </ul>
                <span class="nav-link text-light" id="userDisplay"></span>
                <a class="nav-link" href="#" onclick="logout()">🚪 Déconnexion</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row mb-4">
            <div class="col-md-6"><h3>Catalogue des ouvrages</h3></div>
            <div class="col-md-6">
                <div class="input-group">
                    <input type="text" id="searchInput" class="form-control" 
                           placeholder="Rechercher par titre, auteur, ISBN..." 
                           onkeypress="if(event.key==='Enter') chargerOuvrages()">
                    <button class="btn btn-primary" onclick="chargerOuvrages()">🔍</button>
                </div>
            </div>
        </div>

        <div class="row" id="ouvragesList"></div>
    </div>

    <div class="modal fade" id="exemplairesModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">📋 Exemplaires de l'ouvrage</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="exemplairesContent"></div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const currentUser = JSON.parse(localStorage.getItem('user') || '{}');
        document.getElementById('userDisplay').textContent = '👤 ' + (currentUser.nom || 'Utilisateur');


        // Afficher le lien Admin si l'utilisateur est admin
        if (currentUser.role === 'ADMINISTRATEUR') {
            document.getElementById('navAdmin').style.display = 'block';
            document.getElementById('navEmprunts').style.display = 'none';
            document.getElementById('navReservations').style.display = 'none';
        }

        if (currentUser.role === 'BIBLIOTHECAIRE') {
            document.getElementById('navAdmin').style.display = 'block';
            document.getElementById('navAdmin').querySelector('a').href = '/biblio';
            document.getElementById('navAdmin').querySelector('a').textContent = '📋 Gestion';
            document.getElementById('navEmprunts').style.display = 'none';
            document.getElementById('navReservations').style.display = 'none';
        }

        async function chargerOuvrages() {
            const motCle = document.getElementById('searchInput').value || '';
            const response = await fetch('/api/ouvrages/recherche?motCle=' + encodeURIComponent(motCle));
            const ouvrages = await response.json();
            
            let html = '';
            ouvrages.forEach(o => {
                html += `
                    <div class="col-md-4 mb-4">
                        <div class="card h-100">
                            <div class="card-body">
                                <h5 class="card-title">${o.titre}</h5>
                                <h6 class="card-subtitle mb-2 text-muted">${o.auteur}</h6>
                                <p><small>ISBN: ${o.isbn}</small></p>
                                <span class="badge bg-${o.disponible ? 'success' : 'danger'} mb-2">
                                    ${o.disponible ? 'Disponible' : 'Indisponible'}
                                </span>
                                <span class="badge bg-info mb-2">${o.nbExemplairesDisponibles} dispo / ${o.nbExemplairesTotal} total</span>
                                ${o.rayon ? `<span class="badge bg-secondary mb-2">📌 ${o.rayon}</span>` : ''}
                                ${currentUser.role === 'BIBLIOTHECAIRE' || currentUser.role === 'ADMINISTRATEUR' ? 
                                    `<button class="btn btn-sm btn-outline-info w-100 mt-2" onclick="voirExemplaires(${o.id})">📋 Voir exemplaires</button>` : ''}
                                <div class="mt-3">
                                    ${o.disponible && currentUser.role !== 'BIBLIOTHECAIRE' && currentUser.role !== 'ADMINISTRATEUR' ? 
                                        `<button class="btn btn-primary btn-sm w-100" onclick="emprunter(${o.id})">📥 Emprunter</button>` :
                                        !o.disponible && currentUser.role !== 'BIBLIOTHECAIRE' && currentUser.role !== 'ADMINISTRATEUR' ?
                                        `<button class="btn btn-warning btn-sm w-100" onclick="reserver(${o.id})">📌 Réserver</button>` : ''}
                                </div>
                            </div>
                        </div>
                    </div>`;
            });
            document.getElementById('ouvragesList').innerHTML = html || 
                '<div class="col-12"><div class="alert alert-info">Aucun ouvrage trouvé</div></div>';
        }

        async function emprunter(ouvrageId) {
            if (!confirm('Voulez-vous emprunter cet ouvrage ?')) return;
            
            try {
                const response = await fetch('/api/emprunts', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({etudiantId: currentUser.id, exemplaireId: ouvrageId})
                });
                const data = await response.json();
                
                if (response.ok) {
                    alert('✅ Emprunt effectué ! Retour prévu le ' + 
                          new Date(data.dateRetourPrevue).toLocaleDateString('fr-FR'));
                    chargerOuvrages();
                } else {
                    alert('❌ ' + (data.message || 'Erreur lors de l\'emprunt'));
                }
            } catch(e) {
                alert('Erreur de connexion');
            }
        }

        async function reserver(ouvrageId) {
            if (!confirm('Voulez-vous réserver cet ouvrage ?')) return;
            
            try {
                const response = await fetch('/api/reservations', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({etudiantId: currentUser.id, ouvrageId: ouvrageId})
                });
                const data = await response.json();
                
                if (response.ok) {
                    alert('✅ Réservation effectuée ! Position : ' + 
                          (data.positionFile || '?'));
                    window.location.href = '/reservations';
                } else {
                    alert('❌ ' + (data.message || 'Erreur'));
                }
            } catch(e) {
                alert('Erreur de connexion');
            }
        }

        async function voirExemplaires(ouvrageId) {
            const response = await fetch('/api/ouvrages/' + ouvrageId + '/exemplaires');
            const exemplaires = await response.json();
            
            let html = '<table class="table"><thead><tr><th>Code-barres</th><th>Statut</th><th>Rayon</th><th>Utilisable pour</th></tr></thead><tbody>';
            exemplaires.forEach(ex => {
                html += `<tr>
                    <td><code style="font-size:1.2em;background:#f0f0f0;padding:5px 10px;border-radius:5px;">${ex.codeBarres}</code></td>
                    <td><span class="badge bg-${ex.statut === 'DISPONIBLE' ? 'success' : ex.statut === 'EMPRUNTE' ? 'danger' : 'warning'}">${ex.statut}</span></td>
                    <td>${ex.rayon || '-'}</td>
                    <td>${ex.statut === 'EMPRUNTE' ? '↩️ Retour' : ex.statut === 'DISPONIBLE' ? '📥 Emprunt' : '⏳ En attente'}</td>
                </tr>`;
            });
            html += '</tbody></table>';
            
            document.getElementById('exemplairesContent').innerHTML = html;
            new bootstrap.Modal(document.getElementById('exemplairesModal')).show();
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/';
        }

        chargerOuvrages();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
