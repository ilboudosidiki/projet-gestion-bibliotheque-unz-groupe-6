<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer Admin - UNZ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card">
                    <div class="card-header bg-dark text-white">
                        <h4>Créer un compte Administrateur</h4>
                    </div>
                    <div class="card-body">
                        <div id="message"></div>
                        <form onsubmit="createAdmin(event)">
                            <div class="mb-3">
                                <label class="form-label">Nom</label>
                                <input type="text" id="nom" class="form-control" value="Admin" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Prénom</label>
                                <input type="text" id="prenom" class="form-control" value="Système" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" id="email" class="form-control" value="admin@unz.bf" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Mot de passe</label>
                                <input type="password" id="password" class="form-control" value="admin123" required minlength="6">
                            </div>
                            <button type="submit" class="btn btn-dark w-100">Créer le compte Admin</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function createAdmin(e) {
            e.preventDefault();
            const nom = document.getElementById('nom').value;
            const prenom = document.getElementById('prenom').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const response = await fetch('/api/auth/admin-register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({nom, prenom, email, motDePasse: password})
            });
            const data = await response.json();
            
            if (response.ok) {
                document.getElementById('message').innerHTML = 
                    '<div class="alert alert-success">✅ Admin créé ! <a href="/login">Se connecter</a></div>';
            } else {
                document.getElementById('message').innerHTML = 
                    '<div class="alert alert-danger">' + (data.message || 'Erreur') + '</div>';
            }
        }
    </script>
</body>
</html>
